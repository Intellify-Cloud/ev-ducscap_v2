---
layout: default
---

{% include navbar.html %}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: page.subtitle | jsonify }},
  {% if page.caption.thumbnail %}"image": {{ page.caption.thumbnail | absolute_url | jsonify }},{% endif %}
  {% if page.date %}"datePublished": {{ page.date | date_to_xmlschema | jsonify }},{% endif %}
  {% if page.last_modified or page.date %}"dateModified": {{ page.last_modified | default: page.date | date_to_xmlschema | jsonify }},{% endif %}
  "author": {
    "@type": "Organization",
    "name": {{ site.company | jsonify }},
    "url": {{ site.url | jsonify }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ site.company | jsonify }},
    "logo": {
      "@type": "ImageObject",
      "url": {{ site.logo.path | absolute_url | jsonify }}
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ page.url | absolute_url | jsonify }}
  }
}
</script>
{% if page.faqs %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for faq in page.faqs %}
    {
      "@type": "Question",
      "name": {{ faq.question | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ faq.answer | strip | jsonify }}
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}

<main class="article-page">
  <header class="article-page__hero">
    <div class="article-page__container">
      <a class="article-page__back" href="{{ '/blog/' | relative_url }}">&larr; Back to insights</a>
      <p class="article-page__eyebrow">Duces Capital Insights</p>
      <h1 class="article-page__title">{{ page.title }}</h1>
      {% if page.subtitle %}<p class="article-page__intro">{{ page.subtitle }}</p>{% endif %}
    </div>
  </header>

  <article class="article-page__content">
    {{ content }}
  </article>

  <nav class="article-page__footer-nav" aria-label="Article navigation">
    <a href="{{ '/blog/' | relative_url }}">View all insights</a>
  </nav>
</main>
