<section class="transfer-calc-hero" aria-labelledby="transfer-calc-hero-title">
  <img
    class="transfer-calc-hero__image"
    src="{{ page.hero_image | relative_url }}"
    alt="{{ page.hero_image_alt }}"
  />

  <div class="transfer-calc-hero__overlay" aria-hidden="true"></div>

  <div class="transfer-calc-hero__content">
    <h1 class="transfer-calc-hero__title" id="transfer-calc-hero-title">
      {{ page.hero_title }}
    </h1>
    <p class="transfer-calc-hero__paragraph">
      {{ page.hero_paragraph }}
    </p>
  </div>
</section>
