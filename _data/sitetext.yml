about:
  title: "About Duces Capital"
  text2: "
    <p>Duces Capital was founded on a simple principle: <strong>property finance doesn't have to be complicated.</strong></p>
    <p>We are a team of dedicated property finance specialists committed to guiding homebuyers, investors, and property owners through every step of the finance journey. With access to a broad panel of South Africa's leading banks and lenders, we work on your behalf to secure the most competitive and suitable finance solution — at <strong>no cost to you</strong>.</p>
    <p>Our approach is built on trust, transparency, and expertise. We take the time to understand your goals, then match you with the right financial partner to make them a reality.</p>"
  text3: "Property Finance Done Right."

