next_steps:
  section_title: ""
  title: "Home is where memories are made."
  text: "Every home journey starts with a desire. We work with leading banks to help you secure the right home loan, making homeownership simpler, faster, and less stressful."
  primary_label: "Get Started by Getting Prequalified"
  primary_url: "/contact/"

five_steps_block:
  title: "The Duces Capital Advantage+"
  intro: "A strong prequalification usually increases the likelihood of obtaining preapproval."
  steps:
    - title: "Know your buying power before you search"
      text: "Receive a prequalification certificate showing your estimated home loan eligibility and budget, helping you shop confidently and prove you're a serious buyer."
    - title: "One application, multiple lenders"
      text: "Complete a single application and your dedicated bond consultant will submit it to several leading banks, including your current bank, saving you time and effort."
    - title: "Review and compare home loan options"
      text: "We gather home loan offers from South Africa's major lenders, making it easy for you to compare rates, terms, and benefits side by side."
    - title: "We secure the most competitive rate for you"
      text: "Your bond specialist works directly with the banks to negotiate on your behalf, helping you obtain the most favourable home loan deal available."
    - title: "No cost to you"
      text: "Our service comes at no charge to homebuyers. We are compensated by the banks, allowing you to receive expert assistance without paying any fees."

three_step_section:
  eyebrow: "As simple as hello."
  title: "The Duces Capital Process"
  primary_label: "Get Started"
  primary_url: "/contact/"
  secondary_label: "Book Appointment"
  secondary_url: "#contact"
  steps:
    - title: "Tell Us What You Need"
      text: "Share your property goals, income, and finance position so we can understand the right path forward."
    - title: "Compare Your Options"
      text: "We look across leading lenders and identify finance options that suit your profile and plans."
    - title: "Prepare Your Application"
      text: "We help gather the right documents, structure the submission, and keep the process clear."
    - title: "Move Toward Approval"
      text: "We guide the application, negotiate where possible, and keep you updated until the next step is clear."

